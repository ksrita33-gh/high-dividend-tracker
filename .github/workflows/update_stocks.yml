name: Update Stock Data

on:
  schedule:
    - cron: '35 2 * * 1-5'   # JST 11:35 (UTC 02:35) 平日
    - cron: '35 6 * * 1-5'   # JST 15:35 (UTC 06:35) 平日
    - cron: '0 9 * * 1-5'    # JST 18:00 (UTC 09:00) 平日
  workflow_dispatch:          # 手動実行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Fetch stock data
        run: python scripts/fetch_stocks.py

      - name: Translate names to Japanese
        run: python scripts/translate_names.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          git diff --staged --quiet || git commit -m "chore: update stocks data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
